<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Заказ такси</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: #1a1d2e;
      padding: 16px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #7c8cff;
    }
    .header-subtitle {
      font-size: 12px;
      color: #6b7280;
    }
    
    /* Map container */
    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    
    #map-canvas {
      display: block;
      touch-action: none;
    }
    
    /* Bottom panel */
    .bottom-panel {
      background: #1a1d2e;
      border-top: 1px solid #2d3148;
      padding: 16px;
    }
    
    .route-info {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .route-point {
      flex: 1;
      background: #131627;
      border: 2px solid #2d3148;
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .route-point.active {
      border-color: #7c8cff;
      box-shadow: 0 0 12px rgba(124, 140, 255, 0.3);
    }
    .route-point.set {
      border-color: #22c55e;
    }
    .route-point.error {
      border-color: #ef4444;
      animation: shake 0.3s;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .route-point-label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .route-point-value {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .route-point-value.placeholder {
      color: #4b5563;
    }
    
    /* Result card */
    .result-card {
      background: linear-gradient(135deg, #1e2235 0%, #131627 100%);
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: none;
    }
    .result-card.visible {
      display: block;
    }
    
    .result-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .result-row:last-child {
      margin-bottom: 0;
    }
    .result-label {
      color: #6b7280;
      font-size: 13px;
    }
    .result-value {
      font-weight: 600;
      font-size: 13px;
    }
    .result-total {
      font-size: 20px;
      color: #22c55e;
    }
    
    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all .15s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #7c8cff;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) {
      background: #6b7bef;
    }
    .btn-success {
      background: #22c55e;
      color: #fff;
    }
    .btn-success:hover:not(:disabled) {
      background: #16a34a;
    }
    .btn-secondary {
      background: #2d3148;
      color: #e2e8f0;
      margin-top: 8px;
    }
    
    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 17, 23, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .loading-overlay.hidden {
      display: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2d3148;
      border-top-color: #7c8cff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 14px;
    }
    
    /* Error message */
    .error-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #7f1d1d;
      color: #fca5a5;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 1001;
      transition: transform 0.3s;
      max-width: 90%;
      text-align: center;
    }
    .error-toast.visible {
      transform: translateX(-50%) translateY(0);
    }
    
    /* Success screen */
    .success-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #0f1117;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      z-index: 1000;
    }
    .success-screen.visible {
      display: flex;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .success-title {
      font-size: 24px;
      font-weight: 700;
      color: #22c55e;
      margin-bottom: 8px;
    }
    .success-text {
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
    }
    
    /* Hints */
    .map-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.8);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: #94a3b8;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Заказ такси</div>
    <div class="header-subtitle">Выберите точки на карте</div>
  </div>
</div>

<div id="map-container">
  <canvas id="map-canvas"></canvas>
  <div class="map-hint" id="map-hint">Нажмите на карту чтобы выбрать точку</div>
</div>

<div class="bottom-panel">
  <div class="route-info">
    <div class="route-point active" id="point-from" data-point="from">
      <div class="route-point-label">Откуда</div>
      <div class="route-point-value placeholder" id="from-text">Выберите на карте</div>
    </div>
    <div class="route-point" id="point-to" data-point="to">
      <div class="route-point-label">Куда</div>
      <div class="route-point-value placeholder" id="to-text">Выберите на карте</div>
    </div>
  </div>
  
  <div class="result-card" id="result-card">
    <div class="result-row">
      <span class="result-label">Расстояние</span>
      <span class="result-value" id="result-distance">0 м</span>
    </div>
    <div class="result-row">
      <span class="result-label">Посадка</span>
      <span class="result-value" id="result-boarding">0 ₽</span>
    </div>
    <div class="result-row">
      <span class="result-label">За км</span>
      <span class="result-value" id="result-per-km">0 ₽</span>
    </div>
    <div class="result-row" style="border-top: 1px solid #2d3148; padding-top: 8px; margin-top: 4px;">
      <span class="result-label" style="font-weight: 600;">Итого</span>
      <span class="result-value result-total" id="result-total">0 ₽</span>
    </div>
  </div>
  
  <button class="btn btn-success" id="submit-btn" disabled>Заказать такси</button>
  <button class="btn btn-secondary" id="reset-btn">Сбросить</button>
</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Загрузка карты...</div>
</div>

<div class="error-toast" id="error-toast"></div>

<div class="success-screen" id="success-screen">
  <div class="success-icon">✓</div>
  <div class="success-title">Заявка отправлена!</div>
  <div class="success-text">
    Информация о заказе отправлена в чат.<br>
    Можете закрыть эту страницу.
  </div>
</div>

<script>
// ─────────────────────── CONFIG ───────────────────────────────
const CONFIG = {
  // Will be loaded from road_data.json
  roadDataUrl: null,
  jsonbinId: null,
  jsonbinKey: null,
  
  // Calibration
  pixelsPerMeter: 10,
  pricePerKm: 15,
  minPrice: 100,
  boardingPrice: 50,
  
  // Max distance from road to accept point
  maxDistanceFromRoad: 30,
};

// ─────────────────────── STATE ────────────────────────────────
const state = {
  mapImage: null,
  roadMask: null,
  roadWidth: 0,
  roadHeight: 0,
  
  zoom: 1,
  panX: 0,
  panY: 0,
  
  selectingPoint: 'from', // 'from' or 'to'
  fromPoint: null,
  toPoint: null,
  
  path: null,
  distance: 0,
  
  userId: null,
  
  isPanning: false,
  lastTouch: null,
  initialPinchDistance: null,
  initialZoom: 1,
};

// ─────────────────────── ELEMENTS ─────────────────────────────
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('map-container');

// ─────────────────────── URL PARAMS ───────────────────────────
function getUrlParams() {
  const params = new URLSearchParams(window.location.search);
  state.userId = params.get('user_id');
  CONFIG.roadDataUrl = params.get('data_url') || './road_data.json';
}

// ─────────────────────── INIT ─────────────────────────────────
async function init() {
  getUrlParams();
  resizeCanvas();
  
  try {
    await loadRoadData();
    document.getElementById('loading').classList.add('hidden');
  } catch (err) {
    console.error('Init error:', err);
    showError('Ошибка загрузки карты: ' + err.message);
  }
}

async function loadRoadData() {
  const response = await fetch(CONFIG.roadDataUrl);
  if (!response.ok) throw new Error('Не удалось загрузить данные');
  
  const data = await response.json();
  
  // Load calibration
  if (data.calibration) {
    CONFIG.pixelsPerMeter = data.calibration.pixelsPerMeter || 10;
    CONFIG.pricePerKm = data.calibration.pricePerKm || 15;
    CONFIG.minPrice = data.calibration.minPrice || 100;
    CONFIG.boardingPrice = data.calibration.boardingPrice || 50;
  }
  
  // Load JSONBin config
  if (data.jsonbin) {
    CONFIG.jsonbinId = data.jsonbin.id;
    CONFIG.jsonbinKey = data.jsonbin.key;
  }
  
  // Load road mask
  state.roadWidth = data.width;
  state.roadHeight = data.height;
  
  await new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      // Decode mask
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = data.width;
      tempCanvas.height = data.height;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(img, 0, 0);
      const imgData = tempCtx.getImageData(0, 0, data.width, data.height);
      
      state.roadMask = new Uint8Array(data.width * data.height);
      for (let i = 0; i < state.roadMask.length; i++) {
        state.roadMask[i] = imgData.data[i * 4] > 127 ? 1 : 0;
      }
      
      resolve();
    };
    img.onerror = reject;
    img.src = data.roadMask;
  });
  
  // Load map image (if URL provided in params or same directory)
  const mapUrl = new URLSearchParams(window.location.search).get('map_url') || './map.png';
  await new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      state.mapImage = img;
      fitMapToScreen();
      redraw();
      resolve();
    };
    img.onerror = () => {
      // No map image, just use road mask
      state.roadWidth = data.width;
      state.roadHeight = data.height;
      fitMapToScreen();
      redraw();
      resolve();
    };
    img.src = mapUrl;
  });
}

function fitMapToScreen() {
  const padding = 20;
  const scaleX = (canvas.width - padding * 2) / state.roadWidth;
  const scaleY = (canvas.height - padding * 2) / state.roadHeight;
  state.zoom = Math.min(scaleX, scaleY, 1);
  state.panX = (canvas.width - state.roadWidth * state.zoom) / 2;
  state.panY = (canvas.height - state.roadHeight * state.zoom) / 2;
}

// ─────────────────────── CANVAS ───────────────────────────────
function resizeCanvas() {
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  if (state.roadWidth) {
    redraw();
  }
}
window.addEventListener('resize', resizeCanvas);

function worldToScreen(wx, wy) {
  return { x: wx * state.zoom + state.panX, y: wy * state.zoom + state.panY };
}

function screenToWorld(sx, sy) {
  return { x: (sx - state.panX) / state.zoom, y: (sy - state.panY) / state.zoom };
}

// ─────────────────────── DRAWING ──────────────────────────────
function redraw() {
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw map image or road mask
  if (state.mapImage) {
    const { x, y } = worldToScreen(0, 0);
    ctx.drawImage(state.mapImage, x, y, state.mapImage.width * state.zoom, state.mapImage.height * state.zoom);
  }
  
  // Draw road overlay
  if (state.roadMask) {
    drawRoadOverlay();
  }
  
  // Draw path
  if (state.path && state.path.length > 1) {
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    
    const first = worldToScreen(state.path[0].x, state.path[0].y);
    ctx.moveTo(first.x, first.y);
    
    for (let i = 1; i < state.path.length; i++) {
      const p = worldToScreen(state.path[i].x, state.path[i].y);
      ctx.lineTo(p.x, p.y);
    }
    
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // Draw points
  if (state.fromPoint) {
    drawPoint(state.fromPoint, '#7c8cff', 'A');
  }
  if (state.toPoint) {
    drawPoint(state.toPoint, '#22c55e', 'B');
  }
}

function drawRoadOverlay() {
  if (!state.roadMask || !state.mapImage) return;
  
  const { x: sx, y: sy } = worldToScreen(0, 0);
  const sw = state.roadWidth * state.zoom;
  const sh = state.roadHeight * state.zoom;
  
  // Only draw if visible
  if (sx + sw < 0 || sy + sh < 0 || sx > canvas.width || sy > canvas.height) return;
  
  // Draw semi-transparent road overlay when no map image
  if (!state.mapImage) {
    const overlayCanvas = document.createElement('canvas');
    overlayCanvas.width = state.roadWidth;
    overlayCanvas.height = state.roadHeight;
    const overlayCtx = overlayCanvas.getContext('2d');
    const imgData = overlayCtx.createImageData(state.roadWidth, state.roadHeight);
    
    for (let i = 0; i < state.roadMask.length; i++) {
      if (state.roadMask[i]) {
        imgData.data[i * 4] = 60;
        imgData.data[i * 4 + 1] = 70;
        imgData.data[i * 4 + 2] = 90;
        imgData.data[i * 4 + 3] = 255;
      }
    }
    
    overlayCtx.putImageData(imgData, 0, 0);
    ctx.drawImage(overlayCanvas, sx, sy, sw, sh);
  }
}

function drawPoint(point, color, label) {
  const { x, y } = worldToScreen(point.x, point.y);
  
  // Shadow
  ctx.shadowColor = color;
  ctx.shadowBlur = 15;
  
  // Circle
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  
  ctx.shadowBlur = 0;
  
  // Border
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.stroke();
  
  // Label
  ctx.font = 'bold 14px system-ui';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
}

// ─────────────────────── A* PATHFINDING ───────────────────────
function findPath(from, to) {
  if (!state.roadMask) return null;
  
  const w = state.roadWidth;
  const h = state.roadHeight;
  
  // Snap points to nearest road
  const start = snapToRoad(from);
  const end = snapToRoad(to);
  
  if (!start || !end) return null;
  
  // A* implementation
  const openSet = new Map();
  const closedSet = new Set();
  const cameFrom = new Map();
  const gScore = new Map();
  const fScore = new Map();
  
  const startKey = `${start.x},${start.y}`;
  const endKey = `${end.x},${end.y}`;
  
  openSet.set(startKey, start);
  gScore.set(startKey, 0);
  fScore.set(startKey, heuristic(start, end));
  
  const directions = [
    { dx: 1, dy: 0 },
    { dx: -1, dy: 0 },
    { dx: 0, dy: 1 },
    { dx: 0, dy: -1 },
    { dx: 1, dy: 1 },
    { dx: -1, dy: 1 },
    { dx: 1, dy: -1 },
    { dx: -1, dy: -1 },
  ];
  
  let iterations = 0;
  const maxIterations = 500000;
  
  while (openSet.size > 0 && iterations < maxIterations) {
    iterations++;
    
    // Get node with lowest fScore
    let current = null;
    let currentKey = null;
    let lowestF = Infinity;
    
    for (const [key, node] of openSet) {
      const f = fScore.get(key) || Infinity;
      if (f < lowestF) {
        lowestF = f;
        current = node;
        currentKey = key;
      }
    }
    
    if (currentKey === endKey) {
      // Reconstruct path
      const path = [current];
      let ck = currentKey;
      while (cameFrom.has(ck)) {
        ck = cameFrom.get(ck);
        const [x, y] = ck.split(',').map(Number);
        path.unshift({ x, y });
      }
      
      // Simplify path
      return simplifyPath(path);
    }
    
    openSet.delete(currentKey);
    closedSet.add(currentKey);
    
    // Explore neighbors (skip some pixels for performance)
    const step = 2;
    for (const dir of directions) {
      const nx = current.x + dir.dx * step;
      const ny = current.y + dir.dy * step;
      
      if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
      if (!state.roadMask[ny * w + nx]) continue;
      
      const neighborKey = `${nx},${ny}`;
      if (closedSet.has(neighborKey)) continue;
      
      const tentativeG = (gScore.get(currentKey) || 0) + 
        (dir.dx !== 0 && dir.dy !== 0 ? 1.414 * step : step);
      
      const existingG = gScore.get(neighborKey) || Infinity;
      
      if (tentativeG < existingG) {
        cameFrom.set(neighborKey, currentKey);
        gScore.set(neighborKey, tentativeG);
        fScore.set(neighborKey, tentativeG + heuristic({ x: nx, y: ny }, end));
        
        if (!openSet.has(neighborKey)) {
          openSet.set(neighborKey, { x: nx, y: ny });
        }
      }
    }
  }
  
  return null;
}

function heuristic(a, b) {
  return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
}

function simplifyPath(path, tolerance = 5) {
  if (path.length < 3) return path;
  
  // Douglas-Peucker simplification
  function simplify(points, start, end, result) {
    let maxDist = 0;
    let maxIndex = 0;
    
    const startPoint = points[start];
    const endPoint = points[end];
    
    for (let i = start + 1; i < end; i++) {
      const dist = pointLineDistance(points[i], startPoint, endPoint);
      if (dist > maxDist) {
        maxDist = dist;
        maxIndex = i;
      }
    }
    
    if (maxDist > tolerance) {
      simplify(points, start, maxIndex, result);
      result.push(points[maxIndex]);
      simplify(points, maxIndex, end, result);
    }
  }
  
  const result = [path[0]];
  simplify(path, 0, path.length - 1, result);
  result.push(path[path.length - 1]);
  
  return result;
}

function pointLineDistance(point, lineStart, lineEnd) {
  const dx = lineEnd.x - lineStart.x;
  const dy = lineEnd.y - lineStart.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return Math.hypot(point.x - lineStart.x, point.y - lineStart.y);
  
  const t = Math.max(0, Math.min(1, 
    ((point.x - lineStart.x) * dx + (point.y - lineStart.y) * dy) / (len * len)
  ));
  
  const projX = lineStart.x + t * dx;
  const projY = lineStart.y + t * dy;
  
  return Math.hypot(point.x - projX, point.y - projY);
}

function snapToRoad(point) {
  const x = Math.round(point.x);
  const y = Math.round(point.y);
  const w = state.roadWidth;
  const h = state.roadHeight;
  
  // Check if already on road
  if (x >= 0 && x < w && y >= 0 && y < h && state.roadMask[y * w + x]) {
    return { x, y };
  }
  
  // Find nearest road pixel
  let nearestDist = Infinity;
  let nearest = null;
  const searchRadius = CONFIG.maxDistanceFromRoad;
  
  for (let dy = -searchRadius; dy <= searchRadius; dy++) {
    for (let dx = -searchRadius; dx <= searchRadius; dx++) {
      const nx = x + dx;
      const ny = y + dy;
      if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
      
      if (state.roadMask[ny * w + nx]) {
        const dist = Math.hypot(dx, dy);
        if (dist < nearestDist) {
          nearestDist = dist;
          nearest = { x: nx, y: ny };
        }
      }
    }
  }
  
  return nearest;
}

function isNearRoad(point) {
  return snapToRoad(point) !== null;
}

// ─────────────────────── CALCULATE COST ───────────────────────
function calculatePathLength(path) {
  if (!path || path.length < 2) return 0;
  
  let length = 0;
  for (let i = 1; i < path.length; i++) {
    length += Math.hypot(path[i].x - path[i-1].x, path[i].y - path[i-1].y);
  }
  
  return length;
}

function calculateCost() {
  if (!state.path) return { distance: 0, cost: 0 };
  
  const pixelLength = calculatePathLength(state.path);
  const meters = pixelLength / CONFIG.pixelsPerMeter;
  const km = meters / 1000;
  
  let cost = CONFIG.boardingPrice + (km * CONFIG.pricePerKm);
  cost = Math.max(cost, CONFIG.minPrice);
  
  return {
    distance: meters,
    cost: Math.round(cost),
    kmCost: Math.round(km * CONFIG.pricePerKm),
  };
}

function updateResult() {
  if (state.fromPoint && state.toPoint) {
    state.path = findPath(state.fromPoint, state.toPoint);
    
    if (state.path) {
      const result = calculateCost();
      state.distance = result.distance;
      
      document.getElementById('result-distance').textContent = 
        result.distance >= 1000 
          ? `${(result.distance / 1000).toFixed(2)} км` 
          : `${Math.round(result.distance)} м`;
      document.getElementById('result-boarding').textContent = `${CONFIG.boardingPrice} ₽`;
      document.getElementById('result-per-km').textContent = `${result.kmCost} ₽`;
      document.getElementById('result-total').textContent = `${result.cost} ₽`;
      
      document.getElementById('result-card').classList.add('visible');
      document.getElementById('submit-btn').disabled = false;
    } else {
      showError('Не удалось построить маршрут');
    }
    
    redraw();
  }
}

// ─────────────────────── INTERACTION ──────────────────────────
function handleMapClick(screenX, screenY) {
  const world = screenToWorld(screenX, screenY);
  
  // Check bounds
  if (world.x < 0 || world.x >= state.roadWidth || 
      world.y < 0 || world.y >= state.roadHeight) {
    showError('Выберите точку на карте');
    return;
  }
  
  // Check if near road
  if (!isNearRoad(world)) {
    showError('Выберите точку рядом с дорогой');
    
    if (state.selectingPoint === 'from') {
      document.getElementById('point-from').classList.add('error');
      setTimeout(() => document.getElementById('point-from').classList.remove('error'), 300);
    } else {
      document.getElementById('point-to').classList.add('error');
      setTimeout(() => document.getElementById('point-to').classList.remove('error'), 300);
    }
    return;
  }
  
  // Set point
  if (state.selectingPoint === 'from') {
    state.fromPoint = { x: Math.round(world.x), y: Math.round(world.y) };
    document.getElementById('from-text').textContent = `X: ${state.fromPoint.x}, Y: ${state.fromPoint.y}`;
    document.getElementById('from-text').classList.remove('placeholder');
    document.getElementById('point-from').classList.add('set');
    document.getElementById('point-from').classList.remove('active');
    
    // Switch to "to" selection
    state.selectingPoint = 'to';
    document.getElementById('point-to').classList.add('active');
    document.getElementById('map-hint').textContent = 'Теперь выберите точку назначения';
  } else {
    state.toPoint = { x: Math.round(world.x), y: Math.round(world.y) };
    document.getElementById('to-text').textContent = `X: ${state.toPoint.x}, Y: ${state.toPoint.y}`;
    document.getElementById('to-text').classList.remove('placeholder');
    document.getElementById('point-to').classList.add('set');
    document.getElementById('point-to').classList.remove('active');
    
    document.getElementById('map-hint').textContent = 'Маршрут построен';
  }
  
  updateResult();
}

// Mouse events
canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    state.isPanning = false;
    state.lastTouch = { x: e.clientX, y: e.clientY };
  }
});

canvas.addEventListener('mousemove', e => {
  if (state.lastTouch && e.buttons === 1) {
    const dx = e.clientX - state.lastTouch.x;
    const dy = e.clientY - state.lastTouch.y;
    
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      state.isPanning = true;
    }
    
    if (state.isPanning) {
      state.panX += dx;
      state.panY += dy;
      state.lastTouch = { x: e.clientX, y: e.clientY };
      redraw();
    }
  }
});

canvas.addEventListener('mouseup', e => {
  if (!state.isPanning && state.lastTouch) {
    const rect = canvas.getBoundingClientRect();
    handleMapClick(e.clientX - rect.left, e.clientY - rect.top);
  }
  state.lastTouch = null;
  state.isPanning = false;
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  state.panX = sx - (sx - state.panX) * factor;
  state.panY = sy - (sy - state.panY) * factor;
  state.zoom = Math.max(0.2, Math.min(5, state.zoom * factor));
  redraw();
}, { passive: false });

// Touch events
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  
  if (e.touches.length === 1) {
    state.lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    state.isPanning = false;
  } else if (e.touches.length === 2) {
    state.initialPinchDistance = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    state.initialZoom = state.zoom;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  
  if (e.touches.length === 1 && state.lastTouch) {
    const dx = e.touches[0].clientX - state.lastTouch.x;
    const dy = e.touches[0].clientY - state.lastTouch.y;
    
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
      state.isPanning = true;
    }
    
    if (state.isPanning) {
      state.panX += dx;
      state.panY += dy;
      state.lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      redraw();
    }
  } else if (e.touches.length === 2 && state.initialPinchDistance) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const scale = dist / state.initialPinchDistance;
    state.zoom = Math.max(0.2, Math.min(5, state.initialZoom * scale));
    redraw();
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  
  if (!state.isPanning && state.lastTouch && e.changedTouches.length === 1) {
    const rect = canvas.getBoundingClientRect();
    handleMapClick(
      e.changedTouches[0].clientX - rect.left,
      e.changedTouches[0].clientY - rect.top
    );
  }
  
  state.lastTouch = null;
  state.isPanning = false;
  state.initialPinchDistance = null;
});

// ─────────────────────── UI HANDLERS ──────────────────────────
document.querySelectorAll('.route-point').forEach(el => {
  el.addEventListener('click', () => {
    state.selectingPoint = el.dataset.point;
    document.querySelectorAll('.route-point').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('map-hint').textContent = 
      state.selectingPoint === 'from' 
        ? 'Выберите точку отправления' 
        : 'Выберите точку назначения';
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  state.fromPoint = null;
  state.toPoint = null;
  state.path = null;
  state.distance = 0;
  state.selectingPoint = 'from';
  
  document.getElementById('from-text').textContent = 'Выберите на карте';
  document.getElementById('from-text').classList.add('placeholder');
  document.getElementById('to-text').textContent = 'Выберите на карте';
  document.getElementById('to-text').classList.add('placeholder');
  
  document.querySelectorAll('.route-point').forEach(el => {
    el.classList.remove('set', 'error');
    el.classList.toggle('active', el.dataset.point === 'from');
  });
  
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('map-hint').textContent = 'Нажмите на карту чтобы выбрать точку';
  
  redraw();
});

document.getElementById('submit-btn').addEventListener('click', submitOrder);

// ─────────────────────── SUBMIT ORDER ─────────────────────────
async function submitOrder() {
  if (!state.fromPoint || !state.toPoint || !state.path) return;
  
  const result = calculateCost();
  
  const order = {
    userId: state.userId,
    from: state.fromPoint,
    to: state.toPoint,
    distance: result.distance,
    cost: result.cost,
    timestamp: Date.now(),
    status: 'pending',
  };
  
  // If JSONBin configured, send there
  if (CONFIG.jsonbinId && CONFIG.jsonbinKey) {
    try {
      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').textContent = 'Отправка...';
      
      // Get current orders
      const getRes = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbinId}/latest`, {
        headers: { 'X-Master-Key': CONFIG.jsonbinKey },
      });
      
      let orders = [];
      if (getRes.ok) {
        const data = await getRes.json();
        orders = data.record.orders || [];
      }
      
      // Add new order
      orders.push(order);
      
      // Update bin
      await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.jsonbinId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': CONFIG.jsonbinKey,
        },
        body: JSON.stringify({ orders }),
      });
      
      document.getElementById('success-screen').classList.add('visible');
    } catch (err) {
      console.error('Submit error:', err);
      showError('Ошибка отправки заказа');
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = 'Заказать такси';
    }
  } else {
    // Fallback: show order info to copy
    const orderText = `Заказ такси:\nОткуда: ${state.fromPoint.x}, ${state.fromPoint.y}\nКуда: ${state.toPoint.x}, ${state.toPoint.y}\nРасстояние: ${Math.round(result.distance)}м\nСтоимость: ${result.cost}₽`;
    
    if (navigator.clipboard) {
      await navigator.clipboard.writeText(orderText);
      alert('Информация о заказе скопирована в буфер обмена');
    } else {
      alert(orderText);
    }
    
    document.getElementById('success-screen').classList.add('visible');
  }
}

// ─────────────────────── ERROR TOAST ──────────────────────────
function showError(message) {
  const toast = document.getElementById('error-toast');
  toast.textContent = message;
  toast.classList.add('visible');
  
  setTimeout(() => {
    toast.classList.remove('visible');
  }, 3000);
}

// ─────────────────────── START ────────────────────────────────
init();
</script>
