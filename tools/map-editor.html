<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REPLACED</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e2e8f0; height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    #sidebar { 
      width: 320px; min-width: 320px; 
      background: #111318; 
      border-right: 1px solid #1e2028; 
      display: flex; flex-direction: column; 
      overflow: hidden; 
    }
    
    #sidebar-header { 
      padding: 16px; 
      border-bottom: 1px solid #1e2028; 
      background: linear-gradient(135deg, #12141a, #181b24);
    }
    #sidebar-header h1 { font-size: 15px; font-weight: 700; color: #7c8cff; margin-bottom: 4px; }
    #sidebar-header p { font-size: 11px; color: #6b7280; }

    /* Tool palette */
    #tool-palette { 
      padding: 12px; 
      border-bottom: 1px solid #1e2028; 
      background: #0d0f13;
    }
    .tool-section { margin-bottom: 10px; }
    .tool-section:last-child { margin-bottom: 0; }
    .tool-label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .tool-row { display: flex; gap: 6px; flex-wrap: wrap; }
    
    .tool-btn {
      flex: 1; min-width: 70px;
      padding: 10px 8px; 
      border-radius: 8px; 
      border: 1px solid #1e2028;
      background: #151820; 
      color: #94a3b8; 
      font-size: 11px; 
      font-weight: 500;
      text-align: center; 
      cursor: pointer;
      transition: all 0.15s;
    }
    .tool-btn:hover { background: #1a1f2a; border-color: #2d3148; color: #e2e8f0; }
    .tool-btn.active { 
      background: linear-gradient(135deg, #2a2f42, #1e2235); 
      border-color: #7c8cff; 
      color: #7c8cff; 
      box-shadow: 0 0 12px rgba(124, 140, 255, 0.15);
    }
    
    .tool-icon { font-size: 16px; margin-bottom: 3px; display: block; }

    /* Slider controls */
    .slider-row { 
      display: flex; align-items: center; gap: 10px; 
      padding: 8px 12px; 
      background: #0d0f13;
      border-bottom: 1px solid #1e2028;
    }
    .slider-row label { font-size: 11px; color: #94a3b8; min-width: 80px; }
    .slider-row input[type=range] { flex: 1; accent-color: #7c8cff; }
    .slider-row span { font-size: 11px; color: #7c8cff; min-width: 30px; text-align: right; font-weight: 600; }

    /* Sidebar content */
    #sidebar-content { 
      flex: 1; 
      overflow-y: auto; 
      padding: 12px;
    }
    
    .section-title { 
      font-size: 10px; font-weight: 700; color: #6b7280; 
      text-transform: uppercase; letter-spacing: 0.05em; 
      margin: 12px 0 8px; 
      padding-bottom: 4px;
      border-bottom: 1px solid #1e2028;
    }
    .section-title:first-child { margin-top: 0; }

    /* Object list */
    .obj-item { 
      background: #151820; 
      border: 1px solid #1e2028; 
      border-radius: 8px; 
      padding: 10px 12px; 
      margin-bottom: 8px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      transition: border-color 0.15s;
    }
    .obj-item:hover { border-color: #2d3148; }
    .obj-item-info { font-size: 12px; }
    .obj-item-info .coords { color: #6b7280; font-size: 10px; margin-top: 2px; }
    .obj-del-btn { 
      background: #2a1515; color: #f87171; 
      border: none; padding: 4px 10px; 
      border-radius: 6px; font-size: 10px; 
      cursor: pointer; font-weight: 500;
      transition: background 0.15s;
    }
    .obj-del-btn:hover { background: #3d1c1c; }

    /* Buttons */
    .btn { 
      display: block; width: 100%; 
      padding: 10px; border-radius: 8px; 
      border: none; cursor: pointer; 
      font-size: 12px; font-weight: 600; 
      transition: opacity 0.15s, transform 0.1s; 
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #7c8cff, #6366f1); color: #fff; }
    .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; }
    .btn-secondary { background: #1e2028; color: #e2e8f0; border: 1px solid #2d3148; }
    .btn + .btn { margin-top: 8px; }

    /* Map area */
    #map-area { 
      flex: 1; position: relative; 
      overflow: hidden; 
      background: #0a0a0f; 
    }
    #map-canvas { display: block; cursor: crosshair; }
    #road-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }

    /* Overlays */
    #coords-display { 
      position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
      background: rgba(0,0,0,0.8); padding: 6px 14px; border-radius: 20px; 
      font-size: 11px; color: #94a3b8; pointer-events: none; 
      backdrop-filter: blur(8px);
    }
    #map-hint { 
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); 
      background: rgba(0,0,0,0.8); padding: 8px 18px; border-radius: 20px; 
      font-size: 12px; color: #e2e8f0; pointer-events: none; white-space: nowrap;
      backdrop-filter: blur(8px);
    }

    /* Zoom controls */
    #zoom-controls { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; }
    .zoom-btn { 
      width: 36px; height: 36px; 
      background: rgba(17, 19, 24, 0.9); 
      border: 1px solid #1e2028; border-radius: 8px; 
      color: #e2e8f0; font-size: 18px; 
      cursor: pointer; 
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px);
      transition: background 0.15s;
    }
    .zoom-btn:hover { background: rgba(30, 32, 40, 0.95); }

    /* Toolbar */
    #toolbar { 
      position: absolute; top: 12px; left: 12px; 
      display: flex; gap: 6px; flex-wrap: wrap; max-width: calc(100% - 200px); 
    }
    .toolbar-btn { 
      padding: 8px 14px; 
      background: rgba(17, 19, 24, 0.9); 
      border: 1px solid #1e2028; border-radius: 8px; 
      color: #e2e8f0; font-size: 11px; 
      cursor: pointer; font-weight: 500;
      backdrop-filter: blur(8px);
      transition: all 0.15s;
    }
    .toolbar-btn:hover { background: rgba(30, 32, 40, 0.95); border-color: #2d3148; }

    /* Loading */
    #loading-overlay { 
      position: fixed; inset: 0; 
      background: rgba(0,0,0,0.7); 
      display: none; align-items: center; justify-content: center; 
      z-index: 100; 
      backdrop-filter: blur(4px);
    }
    #loading-overlay .spinner { 
      width: 40px; height: 40px; 
      border: 3px solid #1e2028; border-top-color: #7c8cff; 
      border-radius: 50%; animation: spin 0.7s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hidden inputs */
    input[type=file] { display: none; }

    /* Status bar */
    #status-bar {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(34, 197, 94, 0.2); border: 1px solid #22c55e;
      padding: 8px 16px; border-radius: 8px;
      font-size: 12px; color: #22c55e;
      display: none;
      backdrop-filter: blur(8px);
    }
    #status-bar.error { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; }
  </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>
<div id="status-bar"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Редактор карты такси v2</h1>
    <p id="sidebar-sub">Загрузите изображение taxi-map.jpg</p>
  </div>

  <!-- Tool palette -->
  <div id="tool-palette">
    <div class="tool-section">
      <div class="tool-label">Дороги</div>
      <div class="tool-row">
        <button class="tool-btn active" data-tool="road" title="Заливка дорог по цвету">
          <span class="tool-icon">~</span>Заливка
        </button>
        <button class="tool-btn" data-tool="brush" title="Кисть для дорог">
          <span class="tool-icon">*</span>Кисть
        </button>
        <button class="tool-btn" data-tool="erase" title="Стёрка дорог">
          <span class="tool-icon">x</span>Стёрка
        </button>
      </div>
    </div>
    
    <div class="tool-section">
      <div class="tool-label">Объекты</div>
      <div class="tool-row">
        <button class="tool-btn" data-tool="oneway" title="Одностороннее движение">
          <span class="tool-icon">></span>Односторон.
        </button>
        <button class="tool-btn" data-tool="radar" title="Радар">
          <span class="tool-icon">R</span>Радар
        </button>
        <button class="tool-btn" data-tool="traffic" title="Светофор">
          <span class="tool-icon">S</span>Светофор
        </button>
      </div>
    </div>
  </div>

  <!-- Brush size slider -->
  <div class="slider-row" id="brush-row" style="display:none">
    <label>Размер кисти:</label>
    <input type="range" id="brush-size" min="5" max="100" value="20" />
    <span id="brush-size-val">20</span>
  </div>

  <!-- Tolerance slider -->
  <div class="slider-row" id="tolerance-row">
    <label>Допуск цвета:</label>
    <input type="range" id="tolerance" min="5" max="150" value="40" />
    <span id="tolerance-val">40</span>
  </div>

  <!-- Oneway length slider -->
  <div class="slider-row" id="oneway-row" style="display:none">
    <label>Длина:</label>
    <input type="range" id="oneway-length" min="30" max="300" value="100" />
    <span id="oneway-length-val">100</span>
  </div>

  <!-- Sidebar content -->
  <div id="sidebar-content">
    <div class="section-title">Односторонние (<span id="oneway-count">0</span>)</div>
    <div id="oneway-list"></div>

    <div class="section-title">Радары (<span id="radar-count">0</span>)</div>
    <div id="radar-list"></div>

    <div class="section-title">Светофоры (<span id="traffic-count">0</span>)</div>
    <div id="traffic-list"></div>

    <div class="section-title">Действия</div>
    <button class="btn btn-danger" id="clear-roads-btn">Очистить дороги</button>
    <button class="btn btn-danger" id="clear-objects-btn">Удалить объекты</button>
    <button class="btn btn-success" id="save-server-btn">Сохранить на сервер</button>
  </div>
</div>

<!-- Map area -->
<div id="map-area">
  <canvas id="road-canvas"></canvas>
  <canvas id="map-canvas"></canvas>

  <div id="coords-display">X: 0, Y: 0</div>
  <div id="map-hint">Загрузите изображение карты</div>

  <div id="zoom-controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-reset">~</button>
    <button class="zoom-btn" id="zoom-out">-</button>
  </div>

  <div id="toolbar">
    <button class="toolbar-btn" id="load-map-btn">Загрузить карту</button>
    <button class="toolbar-btn" id="export-btn">Экспорт JSON</button>
    <button class="toolbar-btn" id="import-btn">Импорт JSON</button>
  </div>
</div>

<input type="file" id="map-image-file" accept="image/*" />
<input type="file" id="import-file" accept=".json" />

<script>
// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const state = {
  zoom: 1, panX: 0, panY: 0,
  mapImage: null,
  mapImageUrl: null,
  
  // Road mask
  roadMask: null,
  roadCtx: null,
  
  // Objects
  oneWays: [],    // { id, x1, y1, x2, y2, direction: 'forward'|'backward' }
  radars: [],     // { id, x, y, width }
  traffics: [],   // { id, x, y, width }
  
  // Tool state
  tool: 'road',
  brushSize: 20,
  tolerance: 40,
  onewayLength: 100,
  
  // Interaction
  isPanning: false,
  isDrawing: false,
  lastMouse: { x: 0, y: 0 },
  onewayStart: null,
};

const STORAGE_KEY = 'taxi_map_editor_v3';
const ROAD_COLOR = 'rgba(99, 190, 255, 0.6)';

// ═══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const roadCanvas = document.getElementById('road-canvas');
const roadOverlayCtx = roadCanvas.getContext('2d');

function resizeCanvas() {
  const area = document.getElementById('map-area');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  roadCanvas.width = area.clientWidth;
  roadCanvas.height = area.clientHeight;
  redraw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ═══════════════════════════════════════════════════════════════
//  COORDINATE TRANSFORMS
// ═══════════════════════════════════════════════════════════════
function w2s(wx, wy) { return { x: wx * state.zoom + state.panX, y: wy * state.zoom + state.panY }; }
function s2w(sx, sy) { return { x: (sx - state.panX) / state.zoom, y: (sy - state.panY) / state.zoom }; }

// ═══════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid
  const gridStep = 50 * state.zoom;
  if (gridStep > 8) {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    const sx = state.panX % gridStep;
    const sy = state.panY % gridStep;
    for (let x = sx; x < canvas.width; x += gridStep) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = sy; y < canvas.height; y += gridStep) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
  }
  
  // Map image
  if (state.mapImage) {
    ctx.globalAlpha = 0.9;
    const { x, y } = w2s(0, 0);
    ctx.drawImage(state.mapImage, x, y, state.mapImage.width * state.zoom, state.mapImage.height * state.zoom);
    ctx.globalAlpha = 1;
  }
  
  // Road mask overlay
  roadOverlayCtx.clearRect(0, 0, roadCanvas.width, roadCanvas.height);
  if (state.roadMask) {
    roadOverlayCtx.globalAlpha = 0.5;
    const { x, y } = w2s(0, 0);
    roadOverlayCtx.drawImage(state.roadMask, x, y, state.roadMask.width * state.zoom, state.roadMask.height * state.zoom);
    roadOverlayCtx.globalAlpha = 1;
  }
  
  // Draw one-ways with arrows
  for (const ow of state.oneWays) {
    drawOneWay(ow);
  }
  
  // Draw radars
  for (const r of state.radars) {
    drawRadar(r);
  }
  
  // Draw traffic lights
  for (const t of state.traffics) {
    drawTrafficLight(t);
  }
  
  // Draw oneway preview if drawing
  if (state.tool === 'oneway' && state.onewayStart) {
    const start = w2s(state.onewayStart.x, state.onewayStart.y);
    const end = w2s(state.onewayStart.endX, state.onewayStart.endY);
    
    ctx.strokeStyle = 'rgba(124, 140, 255, 0.8)';
    ctx.lineWidth = 4;
    ctx.setLineDash([8, 4]);
    ctx.beginPath();
    ctx.moveTo(start.x, start.y);
    ctx.lineTo(end.x, end.y);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Arrow
    drawArrow(start.x, start.y, end.x, end.y, '#7c8cff');
  }
}

function drawOneWay(ow) {
  const start = w2s(ow.x1, ow.y1);
  const end = w2s(ow.x2, ow.y2);
  
  // Line
  ctx.strokeStyle = '#7c8cff';
  ctx.lineWidth = 4 * state.zoom;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(start.x, start.y);
  ctx.lineTo(end.x, end.y);
  ctx.stroke();
  
  // Arrows along the line
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const len = Math.hypot(dx, dy);
  const arrowSpacing = 40 * state.zoom;
  const arrowCount = Math.max(1, Math.floor(len / arrowSpacing));
  
  for (let i = 1; i <= arrowCount; i++) {
    const t = i / (arrowCount + 1);
    const ax = start.x + dx * t;
    const ay = start.y + dy * t;
    
    if (ow.direction === 'backward') {
      drawArrow(end.x, end.y, start.x, start.y, '#7c8cff', ax, ay);
    } else {
      drawArrow(start.x, start.y, end.x, end.y, '#7c8cff', ax, ay);
    }
  }
}

function drawArrow(x1, y1, x2, y2, color, px, py) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const size = 12 * state.zoom;
  const cx = px !== undefined ? px : (x1 + x2) / 2;
  const cy = py !== undefined ? py : (y1 + y2) / 2;
  
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx + Math.cos(angle) * size, cy + Math.sin(angle) * size);
  ctx.lineTo(cx + Math.cos(angle + 2.5) * size * 0.6, cy + Math.sin(angle + 2.5) * size * 0.6);
  ctx.lineTo(cx + Math.cos(angle - 2.5) * size * 0.6, cy + Math.sin(angle - 2.5) * size * 0.6);
  ctx.closePath();
  ctx.fill();
}

function drawRadar(r) {
  const { x, y } = w2s(r.x, r.y);
  const size = (r.width || 24) * state.zoom * 0.5;
  
  // Glow
  ctx.shadowColor = '#f59e0b';
  ctx.shadowBlur = 15;
  
  // Circle
  ctx.fillStyle = 'rgba(245, 158, 11, 0.3)';
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Label
  ctx.font = `bold ${Math.max(10, 12 * state.zoom)}px system-ui`;
  ctx.fillStyle = '#f59e0b';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R', x, y);
}

function drawTrafficLight(t) {
  const { x, y } = w2s(t.x, t.y);
  const size = (t.width || 20) * state.zoom * 0.5;
  
  // Glow
  ctx.shadowColor = '#22c55e';
  ctx.shadowBlur = 15;
  
  // Circle
  ctx.fillStyle = 'rgba(34, 197, 94, 0.3)';
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Label
  ctx.font = `bold ${Math.max(10, 12 * state.zoom)}px system-ui`;
  ctx.fillStyle = '#22c55e';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', x, y);
}

// ═══════════════════════════════════════════════════════════════
//  ROAD MASK
// ═══════════════════════════════════════════════════════════════
function ensureRoadMask() {
  if (!state.mapImage) return;
  const w = state.mapImage.width;
  const h = state.mapImage.height;
  if (state.roadMask && state.roadMask.width === w && state.roadMask.height === h) return;
  
  const c = document.createElement('canvas');
  c.width = w;
  c.height = h;
  state.roadMask = c;
  state.roadCtx = c.getContext('2d');
}

function floodFillRoads(worldX, worldY, tolerance) {
  if (!state.mapImage) { showLoading(false); return; }
  ensureRoadMask();

  const imgW = state.mapImage.width;
  const imgH = state.mapImage.height;
  const px = Math.round(worldX);
  const py = Math.round(worldY);

  if (px < 0 || py < 0 || px >= imgW || py >= imgH) {
    showLoading(false);
    return;
  }

  // Read source image pixels into a temp canvas
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = imgW;
  tmpCanvas.height = imgH;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(state.mapImage, 0, 0);
  const imgData = tmpCtx.getImageData(0, 0, imgW, imgH);
  const pix = imgData.data;

  // Get current mask
  const maskData = state.roadCtx.getImageData(0, 0, imgW, imgH);
  const maskPix = maskData.data;

  // Seed colour
  const idx0 = (py * imgW + px) * 4;
  const sr = pix[idx0], sg = pix[idx0 + 1], sb = pix[idx0 + 2];

  // Use a plain JS array as queue — avoids Int32Array overflow on large images
  const visited = new Uint8Array(imgW * imgH);
  const queueX = [];
  const queueY = [];

  const colorDiff = (i) =>
    Math.abs(pix[i] - sr) + Math.abs(pix[i + 1] - sg) + Math.abs(pix[i + 2] - sb);

  function tryEnqueue(x, y) {
    if (x < 0 || y < 0 || x >= imgW || y >= imgH) return;
    const i = y * imgW + x;
    if (visited[i]) return;
    visited[i] = 1;
    if (colorDiff(i * 4) > tolerance) return;
    queueX.push(x);
    queueY.push(y);
  }

  tryEnqueue(px, py);

  // Process in async chunks so the browser stays responsive
  const CHUNK = 40000; // pixels per frame
  let head = 0;
  let processed = 0;

  function step() {
    const end = Math.min(queueX.length, head + CHUNK);

    while (head < end) {
      const x = queueX[head];
      const y = queueY[head];
      head++;

      const mi = (y * imgW + x) * 4;
      maskPix[mi]     = 99;
      maskPix[mi + 1] = 190;
      maskPix[mi + 2] = 255;
      maskPix[mi + 3] = 200;
      processed++;

      tryEnqueue(x + 1, y);
      tryEnqueue(x - 1, y);
      tryEnqueue(x, y + 1);
      tryEnqueue(x, y - 1);
    }

    if (head < queueX.length) {
      // More pixels to process — yield to browser then continue
      requestAnimationFrame(step);
    } else {
      // Done — commit mask, redraw, save
      state.roadCtx.putImageData(maskData, 0, 0);
      redraw();
      save();
      showLoading(false);
      showStatus(`Заполнено ${processed.toLocaleString()} пикселей`);
    }
  }

  requestAnimationFrame(step);
}

function brushPaint(worldX, worldY, size, erase) {
  ensureRoadMask();
  if (!state.roadCtx) return;
  
  if (erase) {
    state.roadCtx.globalCompositeOperation = 'destination-out';
    state.roadCtx.fillStyle = 'rgba(0,0,0,1)';
  } else {
    state.roadCtx.globalCompositeOperation = 'source-over';
    state.roadCtx.fillStyle = 'rgba(99, 190, 255, 0.8)';
  }
  
  state.roadCtx.beginPath();
  state.roadCtx.arc(worldX, worldY, size / 2, 0, Math.PI * 2);
  state.roadCtx.fill();
  state.roadCtx.globalCompositeOperation = 'source-over';
  redraw();
}

function measureRoadWidth(worldX, worldY) {
  if (!state.roadMask) return 24;
  
  const ctx = state.roadMask.getContext('2d');
  const imgW = state.roadMask.width;
  const imgH = state.roadMask.height;
  const px = Math.round(worldX);
  const py = Math.round(worldY);
  
  if (px < 0 || py < 0 || px >= imgW || py >= imgH) return 24;
  
  const data = ctx.getImageData(0, 0, imgW, imgH).data;
  const isMask = (x, y) => {
    if (x < 0 || y < 0 || x >= imgW || y >= imgH) return false;
    return data[(y * imgW + x) * 4 + 3] > 60;
  };
  
  if (!isMask(px, py)) return 24;
  
  // Measure in 4 directions
  const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];
  const dists = dirs.map(([dx, dy]) => {
    let d = 0;
    while (d < 100 && isMask(px + dx * d, py + dy * d)) d++;
    return d;
  });
  
  return Math.max(12, Math.min(dists[0] + dists[1], dists[2] + dists[3]));
}

// ═══════════════════════════════════════════════════════════════
//  MOUSE INTERACTION
// ═══════════════════════════════════════════════════════════════
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2) {
    state.isPanning = true;
    state.lastMouse = { x: e.clientX, y: e.clientY };
    return;
  }
  
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = s2w(sx, sy);
  
  if (state.tool === 'road') {
    showLoading(true);
    requestAnimationFrame(() => floodFillRoads(world.x, world.y, state.tolerance));
    
  } else if (state.tool === 'brush' || state.tool === 'erase') {
    state.isDrawing = true;
    brushPaint(world.x, world.y, state.brushSize, state.tool === 'erase');
    
  } else if (state.tool === 'oneway') {
    // Start drawing one-way
    state.onewayStart = {
      x: world.x,
      y: world.y,
      endX: world.x,
      endY: world.y,
    };
    
  } else if (state.tool === 'radar') {
    const width = measureRoadWidth(world.x, world.y);
    state.radars.push({
      id: genId(),
      x: Math.round(world.x),
      y: Math.round(world.y),
      width,
    });
    save();
    redraw();
    renderLists();
    
  } else if (state.tool === 'traffic') {
    const width = measureRoadWidth(world.x, world.y);
    state.traffics.push({
      id: genId(),
      x: Math.round(world.x),
      y: Math.round(world.y),
      width,
    });
    save();
    redraw();
    renderLists();
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const world = s2w(sx, sy);
  
  document.getElementById('coords-display').textContent = `X: ${Math.round(world.x)}, Y: ${Math.round(world.y)}`;
  
  if (state.isPanning) {
    state.panX += e.clientX - state.lastMouse.x;
    state.panY += e.clientY - state.lastMouse.y;
    state.lastMouse = { x: e.clientX, y: e.clientY };
    redraw();
    return;
  }
  
  if (state.isDrawing && (state.tool === 'brush' || state.tool === 'erase')) {
    brushPaint(world.x, world.y, state.brushSize, state.tool === 'erase');
  }
  
  if (state.tool === 'oneway' && state.onewayStart) {
    // Calculate endpoint based on angle and length
    const dx = world.x - state.onewayStart.x;
    const dy = world.y - state.onewayStart.y;
    const angle = Math.atan2(dy, dx);
    state.onewayStart.endX = state.onewayStart.x + Math.cos(angle) * state.onewayLength;
    state.onewayStart.endY = state.onewayStart.y + Math.sin(angle) * state.onewayLength;
    redraw();
  }
});

canvas.addEventListener('mouseup', e => {
  state.isPanning = false;
  
  if (state.isDrawing) {
    state.isDrawing = false;
    save();
  }
  
  if (state.tool === 'oneway' && state.onewayStart) {
    // Finish one-way
    state.oneWays.push({
      id: genId(),
      x1: Math.round(state.onewayStart.x),
      y1: Math.round(state.onewayStart.y),
      x2: Math.round(state.onewayStart.endX),
      y2: Math.round(state.onewayStart.endY),
      direction: 'forward',
    });
    state.onewayStart = null;
    save();
    redraw();
    renderLists();
  }
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const f = e.deltaY < 0 ? 1.12 : 0.9;
  state.panX = sx - (sx - state.panX) * f;
  state.panY = sy - (sy - state.panY) * f;
  state.zoom = Math.max(0.1, Math.min(10, state.zoom * f));
  redraw();
}, { passive: false });

// ═══════════════════════════════════════════════════════════════
//  ZOOM CONTROLS
// ═══════════════════════════════════════════════════════════════
document.getElementById('zoom-in').addEventListener('click', () => {
  state.zoom = Math.min(10, state.zoom * 1.2);
  redraw();
});
document.getElementById('zoom-out').addEventListener('click', () => {
  state.zoom = Math.max(0.1, state.zoom / 1.2);
  redraw();
});
document.getElementById('zoom-reset').addEventListener('click', () => {
  state.zoom = 1;
  state.panX = 0;
  state.panY = 0;
  redraw();
});

// ═══════════════════════════════════════════════════════════════
//  TOOL CONTROLS
// ═══════════════════════════════════════════════════════════════
function updateToolUI() {
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tool === state.tool);
  });
  
  document.getElementById('brush-row').style.display = ['brush', 'erase'].includes(state.tool) ? 'flex' : 'none';
  document.getElementById('tolerance-row').style.display = state.tool === 'road' ? 'flex' : 'none';
  document.getElementById('oneway-row').style.display = state.tool === 'oneway' ? 'flex' : 'none';
  
  const hints = {
    road: 'Кликните на дорогу — заливка заполнит связные пиксели одного цвета',
    brush: 'Рисуйте кистью чтобы добавить маску дороги',
    erase: 'Рисуйте чтобы стереть маску дороги',
    oneway: 'Кликните и потяните чтобы указать направление одностороннего движения',
    radar: 'Кликните на дорогу чтобы поставить радар',
    traffic: 'Кликните на дорогу чтобы поставить светофор',
  };
  document.getElementById('map-hint').textContent = hints[state.tool] || '';
  
  const cursors = {
    road: 'copy',
    brush: 'cell',
    erase: 'not-allowed',
    oneway: 'crosshair',
    radar: 'crosshair',
    traffic: 'crosshair',
  };
  canvas.style.cursor = cursors[state.tool] || 'crosshair';
}

document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tool = btn.dataset.tool;
    updateToolUI();
  });
});

document.getElementById('brush-size').addEventListener('input', e => {
  state.brushSize = parseInt(e.target.value);
  document.getElementById('brush-size-val').textContent = state.brushSize;
});

document.getElementById('tolerance').addEventListener('input', e => {
  state.tolerance = parseInt(e.target.value);
  document.getElementById('tolerance-val').textContent = state.tolerance;
});

document.getElementById('oneway-length').addEventListener('input', e => {
  state.onewayLength = parseInt(e.target.value);
  document.getElementById('oneway-length-val').textContent = state.onewayLength;
});

// ═════��═════════════════════════════════════════════════════════
//  RENDER LISTS
// ════════════���══════════════════════════════════════════════════
function renderLists() {
  // One-ways
  document.getElementById('oneway-count').textContent = state.oneWays.length;
  document.getElementById('oneway-list').innerHTML = state.oneWays.map(ow => `
    <div class="obj-item">
      <div class="obj-item-info">
        <div>Односторон. ${ow.direction === 'forward' ? '>' : '<'}</div>
        <div class="coords">(${ow.x1}, ${ow.y1}) - (${ow.x2}, ${ow.y2})</div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="obj-del-btn" onclick="toggleOnewayDir('${ow.id}')" style="background:#1e3a5f;color:#60a5fa">Flip</button>
        <button class="obj-del-btn" onclick="deleteOneway('${ow.id}')">X</button>
      </div>
    </div>
  `).join('');
  
  // Radars
  document.getElementById('radar-count').textContent = state.radars.length;
  document.getElementById('radar-list').innerHTML = state.radars.map(r => `
    <div class="obj-item">
      <div class="obj-item-info">
        <div>Радар</div>
        <div class="coords">(${r.x}, ${r.y}) w:${r.width}</div>
      </div>
      <button class="obj-del-btn" onclick="deleteRadar('${r.id}')">X</button>
    </div>
  `).join('');
  
  // Traffic lights
  document.getElementById('traffic-count').textContent = state.traffics.length;
  document.getElementById('traffic-list').innerHTML = state.traffics.map(t => `
    <div class="obj-item">
      <div class="obj-item-info">
        <div>Светофор</div>
        <div class="coords">(${t.x}, ${t.y}) w:${t.width}</div>
      </div>
      <button class="obj-del-btn" onclick="deleteTraffic('${t.id}')">X</button>
    </div>
  `).join('');
}

window.toggleOnewayDir = function(id) {
  const ow = state.oneWays.find(o => o.id === id);
  if (ow) {
    ow.direction = ow.direction === 'forward' ? 'backward' : 'forward';
    save();
    redraw();
    renderLists();
  }
};

window.deleteOneway = function(id) {
  state.oneWays = state.oneWays.filter(o => o.id !== id);
  save();
  redraw();
  renderLists();
};

window.deleteRadar = function(id) {
  state.radars = state.radars.filter(r => r.id !== id);
  save();
  redraw();
  renderLists();
};

window.deleteTraffic = function(id) {
  state.traffics = state.traffics.filter(t => t.id !== id);
  save();
  redraw();
  renderLists();
};

// ═══════════════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function save() {
  const data = {
    oneWays: state.oneWays,
    radars: state.radars,
    traffics: state.traffics,
    mapImageUrl: state.mapImageUrl,
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {}
  
  // Save road mask as data URL
  if (state.roadMask) {
    try {
      const maskUrl = state.roadMask.toDataURL('image/png');
      localStorage.setItem(STORAGE_KEY + '_mask', maskUrl);
    } catch (e) {}
  }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.oneWays = data.oneWays || [];
      state.radars = data.radars || [];
      state.traffics = data.traffics || [];
      
      if (data.mapImageUrl) {
        loadMapImage(data.mapImageUrl);
      }
    }
    
    // Load road mask
    const maskUrl = localStorage.getItem(STORAGE_KEY + '_mask');
    if (maskUrl) {
      const img = new Image();
      img.onload = () => {
        ensureRoadMask();
        if (state.roadCtx) {
          state.roadCtx.clearRect(0, 0, state.roadMask.width, state.roadMask.height);
          state.roadCtx.drawImage(img, 0, 0);
          redraw();
        }
      };
      img.src = maskUrl;
    }
  } catch (e) {}
  
  renderLists();
  updateToolUI();
}

function loadMapImage(url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    state.mapImage = img;
    state.mapImageUrl = url;
    ensureRoadMask();
    
    // Center image
    state.panX = (canvas.width - img.width) / 2;
    state.panY = (canvas.height - img.height) / 2;
    
    document.getElementById('sidebar-sub').textContent = `Карта: ${img.width}x${img.height}`;
    redraw();
    save();
  };
  img.onerror = () => {
    showStatus('Ошибка загрузки изображения', true);
  };
  img.src = url;
}

// ═══════════════════════════════════════════════════════════════
//  TOOLBAR ACTIONS
// ═══════════════════════════════════════════════════════════════
document.getElementById('load-map-btn').addEventListener('click', () => {
  document.getElementById('map-image-file').click();
});

document.getElementById('map-image-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = ev => {
    loadMapImage(ev.target.result);
  };
  reader.readAsDataURL(file);
});

document.getElementById('clear-roads-btn').addEventListener('click', () => {
  if (!confirm('Очистить все дороги?')) return;
  if (state.roadMask && state.roadCtx) {
    state.roadCtx.clearRect(0, 0, state.roadMask.width, state.roadMask.height);
    redraw();
    save();
    showStatus('Дороги очищены');
  }
});

document.getElementById('clear-objects-btn').addEventListener('click', () => {
  if (!confirm('Удалить все объекты?')) return;
  state.oneWays = [];
  state.radars = [];
  state.traffics = [];
  save();
  redraw();
  renderLists();
  showStatus('Объекты удалены');
});

document.getElementById('export-btn').addEventListener('click', () => {
  const data = {
    mapImageUrl: state.mapImageUrl,
    mapWidth: state.mapImage?.width || 0,
    mapHeight: state.mapImage?.height || 0,
    roadMask: state.roadMask?.toDataURL('image/png') || '',
    oneWays: state.oneWays.map(ow => ({
      id: ow.id,
      segments: [{ x1: ow.x1, y1: ow.y1, x2: ow.x2, y2: ow.y2 }],
      direction: ow.direction,
    })),
    radars: state.radars,
    trafficLights: state.traffics,
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'taxi_roads.json';
  a.click();
  URL.revokeObjectURL(url);
  
  showStatus('JSON экспортирован');
});

document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      
      if (data.mapImageUrl) {
        loadMapImage(data.mapImageUrl);
      }
      
      state.oneWays = (data.oneWays || []).map(ow => ({
        id: ow.id || genId(),
        x1: ow.segments?.[0]?.x1 || 0,
        y1: ow.segments?.[0]?.y1 || 0,
        x2: ow.segments?.[0]?.x2 || 0,
        y2: ow.segments?.[0]?.y2 || 0,
        direction: ow.direction || 'forward',
      }));
      
      state.radars = data.radars || [];
      state.traffics = data.trafficLights || [];
      
      if (data.roadMask) {
        const img = new Image();
        img.onload = () => {
          ensureRoadMask();
          if (state.roadCtx) {
            state.roadCtx.clearRect(0, 0, state.roadMask.width, state.roadMask.height);
            state.roadCtx.drawImage(img, 0, 0);
            redraw();
          }
        };
        img.src = data.roadMask;
      }
      
      save();
      redraw();
      renderLists();
      showStatus('JSON импортирован');
    } catch (err) {
      showStatus('Ошибка импорта: ' + err.message, true);
    }
  };
  reader.readAsText(file);
});

// Save to server
document.getElementById('save-server-btn').addEventListener('click', async () => {
  showLoading(true);
  
  try {
    const data = {
      mapImageUrl: state.mapImageUrl,
      mapWidth: state.mapImage?.width || 0,
      mapHeight: state.mapImage?.height || 0,
      roadMask: state.roadMask?.toDataURL('image/png') || '',
      oneWays: state.oneWays.map(ow => ({
        id: ow.id,
        segments: [{ x1: ow.x1, y1: ow.y1, x2: ow.x2, y2: ow.y2 }],
        direction: ow.direction,
      })),
      radars: state.radars,
      trafficLights: state.traffics,
    };
    
    const res = await fetch('/api/taxi-map', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    
    const result = await res.json();
    if (result.ok) {
      showStatus('Сохранено на сервер!');
    } else {
      showStatus('Ошибка: ' + (result.error || 'Неизвестная ошибка'), true);
    }
  } catch (err) {
    showStatus('Ошибка сети: ' + err.message, true);
  }
  
  showLoading(false);
});

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function showLoading(show) {
  document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

function showStatus(msg, isError = false) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = isError ? 'error' : '';
  el.style.display = 'block';
  setTimeout(() => {
    el.style.display = 'none';
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
load();
</script>
